<app-navbar></app-navbar>

<div class="venues-page">

  <h1 class="title">
    {{ searchTerm ? 'Search results for "' + searchTerm + '"' : category + ' Venues' }}
  </h1>

  <div *ngIf="loading">
    Loading...
  </div>

  <div
    class="venues-grid"
    *ngIf="!loading && fields.length > 0"
  >

    <div
      class="venue-card"
      *ngFor="let field of fields"
      [routerLink]="['/venue', field.id]"
    >

      <img
        [src]="field.imageURL"
        alt=""
      >

      <div class="overlay">

        <h2>
          {{ field.name }}
        </h2>

        <p>
          {{ field.address }}
        </p>

        <span>
          {{ field.pricePerHour }} RON / hour
        </span>

      </div>

    </div>

  </div>

  <div
    class="empty"
    *ngIf="!loading && fields.length === 0"
  >
    Nu există terenuri pentru {{ category }}.
  </div>

</div>

<app-footer></app-footer>
