<div
  class="toast success"
  *ngIf="successMessage"
>
  ✅ {{ successMessage }}
</div>

<div
  class="toast error"
  *ngIf="errorMessage"
>
  ❌ {{ errorMessage }}
</div>

<div class="main-container">

  <div class="forms-wrapper">

    <!-- LOGIN -->
    <div
      class="form-panel login-panel"
      [class.hidden]="!isLoginForm"
    >

      <h1>
        ORADEA SPORT CONNECT
      </h1>

      <h2>
        Welcome Back
      </h2>

      <p>
        Conectează-te pentru a rezerva terenul preferat.
      </p>

      <input
        type="email"
        [(ngModel)]="loginData.email"
        placeholder="Email"
      >

      <input
        type="password"
        [(ngModel)]="loginData.password"
        placeholder="Parolă"
      >

      <button
        (click)="onLogin()"
      >
        {{
          loading
            ? 'Loading...'
            : 'Autentificare'
        }}
      </button>

    </div>

    <!-- REGISTER -->
    <div
      class="form-panel register-panel"
      [class.hidden]="isLoginForm"
    >

      <h1>
        ORADEA SPORT CONNECT
      </h1>

      <h2>
        Registration
      </h2>

      <p>
        Creează-ți contul.
      </p>

      <div class="name-row">

        <input
          type="text"
          [(ngModel)]="registerData.lastName"
          placeholder="Nume"
        >

        <input
          type="text"
          [(ngModel)]="registerData.firstName"
          placeholder="Prenume"
        >

      </div>

      <input
        type="email"
        [(ngModel)]="registerData.email"
        placeholder="Email"
      >

      <input
        type="tel"
        [(ngModel)]="registerData.phoneNumber"
        placeholder="Telefon"
      >

      <input
        type="password"
        [(ngModel)]="registerData.password"
        placeholder="Parolă"
      >

      <button
        class="green"
        (click)="onRegister()"
      >
        {{
          loading
            ? 'Loading...'
            : 'Înregistrare'
        }}
      </button>

    </div>

  </div>

  <!-- BALL -->
  <div class="ball-side">

    <img
      [src]="
        isLoginForm
          ? '/soccer_ball.png'
          : '/basketball_ball.png'
      "
    >

    <div class="overlay-content">

      <h3>
        HELLO, WELCOME!
      </h3>

      <p>
        {{
          isLoginForm
            ? 'Nu ai cont încă?'
            : 'Ai deja cont?'
        }}
      </p>

      <button
        class="switch-btn"
        (click)="toggleForm()"
      >
        {{
          isLoginForm
            ? 'Register'
            : 'Login'
        }}
      </button>

    </div>

  </div>

</div>
