<section class="categories">

  <div class="container">

    <h2>
      Choose Your Sport
    </h2>

    <div class="grid">

      <div
        class="card"

        *ngFor="let category of categories"
      >

        <img
          [src]="'/' + category.image"
        >

        <div class="overlay">

          <h3>
            {{ category.name }}
          </h3>

        </div>

      </div>

    </div>

  </div>

</section>
